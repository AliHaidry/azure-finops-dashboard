name: FinOps Cost Alerts

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:        # Manual trigger for testing

permissions:
  id-token: write
  contents: read

jobs:
  check-and-alert:
    name: Check costs and send alerts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Start PostgreSQL
        run: |
          az postgres flexible-server start \
            --resource-group finops-rg-dev \
            --name finops-pg-dev || true
          echo "Waiting 60s for server to become ready..."
          sleep 60

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install psycopg2-binary requests

      - name: Run alert checks
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          BUDGET_WARNING_THRESHOLD: '0.80'
          BUDGET_CRITICAL_THRESHOLD: '1.00'
          SPIKE_MULTIPLIER: '2.0'
        run: python scripts/alert_check.py

      - name: Stop PostgreSQL
        if: always()
        run: |
          az postgres flexible-server stop \
            --resource-group finops-rg-dev \
            --name finops-pg-dev || true
