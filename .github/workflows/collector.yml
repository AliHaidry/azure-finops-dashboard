name: FinOps Collector

on:
  schedule:
    - cron: '0 6 * * *'    # daily at 06:00 UTC (after Azure cost data refresh)
  workflow_dispatch:         # manual trigger
    inputs:
      backfill_days:
        description: 'Number of days to backfill'
        required: false
        default: '1'
      dry_run:
        description: 'Dry run (no DB writes)'
        required: false
        default: 'false'
        type: boolean

permissions:
  id-token: write    # required for OIDC
  contents: read

jobs:
  collect:
    name: Collect Azure cost data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: collector/requirements.txt

      - name: Install dependencies
        run: |
          cd collector
          pip install -r requirements.txt

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run collector
        env:
          SUBSCRIPTION_IDS: ${{ secrets.SUBSCRIPTION_IDS }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CURRENCY: USD
          LOG_LEVEL: INFO
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          cd collector
          python collector.py \
            --backfill ${{ github.event.inputs.backfill_days || '1' }} \
            --no-prometheus

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::FinOps collector failed — check logs above"
