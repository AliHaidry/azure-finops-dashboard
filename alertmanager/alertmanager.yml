global:
  resolve_timeout: 5m
  slack_api_url: '${SLACK_WEBHOOK_URL}'

route:
  group_by: ['alertname', 'resource_group']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: slack-warning
  routes:
    - match:
        severity: critical
      receiver: slack-critical

receivers:
  - name: slack-warning
    slack_configs:
      - channel: '#finops-alerts'
        icon_emoji: ':warning:'
        title: '⚠️ FinOps Warning — {{ .CommonAnnotations.summary }}'
        text: '{{ .CommonAnnotations.description }}'
        send_resolved: true

  - name: slack-critical
    slack_configs:
      - channel: '#finops-alerts'
        icon_emoji: ':fire:'
        title: '🔴 FinOps CRITICAL — {{ .CommonAnnotations.summary }}'
        text: '{{ .CommonAnnotations.description }}'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['resource_group']
